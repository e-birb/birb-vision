  #  - uses: actions/checkout@v4
  #  - name: Install MinGW-w64
  #    run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-i686
  #  - name: Setup target
  #    run: rustup target add i686-pc-windows-gnu
  #  - name: Build
  #    run: cargo build --target i686-pc-windows-gnu --workspace
  #  - name: Build Example
  #    run: cargo build --target i686-pc-windows-gnu --features "${WINDOWS_BACKENDS}" --example all_cameras

  build-x86_64-pc-windows-msvc:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --workspace
    - name: Run Example
      run: cargo run --features "${WINDOWS_BACKENDS}" --example all_cameras

  build-i686-pc-windows-msvc:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --workspace
    - name: Run Example
      run: cargo run --features "${WINDOWS_BACKENDS}" --example all_cameras
