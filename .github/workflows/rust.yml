name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  WINDOWS_BACKENDS: media-foundation,directshow,mvs,daheng,icube
  LINUX_BACKENDS: v4l,mvs,daheng,icube

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --workspace # --verbose
    - name: Check feature combinations (birb-vision-core)
      run: |
        echo "=== no features ===" && cargo check -p birb-vision-core --no-default-features
        echo "=== log ===" && cargo check -p birb-vision-core --features log
        echo "=== conversion ===" && cargo check -p birb-vision-core --features conversion
        echo "=== timeout ===" && cargo check -p birb-vision-core --features timeout
        echo "=== clap ===" && cargo check -p birb-vision-core --features clap
        echo "=== all features ===" && cargo check -p birb-vision-core --all-features
    - name: Check feature combinations (birb-vision)
      run: |
        echo "=== no default features ===" && cargo check -p birb-vision --no-default-features
        echo "=== default (conversion) ===" && cargo check -p birb-vision
        echo "=== conversion + log ===" && cargo check -p birb-vision --features conversion,log
        echo "=== all features ===" && cargo check -p birb-vision --features "${LINUX_BACKENDS}",log,timeout,clap
    - name: Run Example
      run: cargo run --features "${LINUX_BACKENDS}" --example all_cameras
    #- name: Run tests
    #  run: cargo test --verbose

  build-x86_64-pc-windows-gnu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install MinGW-w64
      run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
    - name: Setup target
      run: rustup target add x86_64-pc-windows-gnu
    - name: Build
      run: cargo build --target x86_64-pc-windows-gnu --workspace
    - name: Build Example
      run: cargo build --target x86_64-pc-windows-gnu --features "${WINDOWS_BACKENDS}" --example all_cameras

  # TODO fix build
  #build-i686-pc-windows-gnu:
  #  runs-on: ubuntu-latest
